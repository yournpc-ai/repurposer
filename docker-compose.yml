services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repurposer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - MUSIC_DIR=/app/data/music
      # Absolute base the render service uses to fetch source clips back over HTTP.
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
      - ./data/music:/app/data/music
    depends_on:
      - db

  # Queue worker: same image as api, different entrypoint. This is the process
  # that POSTs clip-specs to the render service and writes the results back.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - MUSIC_DIR=/app/data/music
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
      - ./data/music:/app/data/music
    depends_on:
      - db
      - render

  # Remotion render service (clip-spec -> MP4+SRT). Headless Chromium + bundled
  # FFmpeg, called by the worker; off the request path for text-only flows.
  # Build context is the repo root (workspace pkg — see apps/render/Dockerfile).
  render:
    build:
      context: .
      dockerfile: apps/render/Dockerfile
    environment:
      - RENDER_PORT=3001
      - RENDER_OUTPUT_DIR=/data/outputs
    volumes:
      # Shared with api/worker: render writes here, api serves it via Range.
      - ./data/outputs:/data/outputs

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
