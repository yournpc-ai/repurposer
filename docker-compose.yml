services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repurposer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repurposer"]
      interval: 2s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-minimax-m3}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-Repurposer <repurposer@yournpc.ai>}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS:-30}
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION:-ap-southeast-1}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_PRESIGN_UPLOAD_TTL=${S3_PRESIGN_UPLOAD_TTL:-3600}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
      - CHANNEL_CREDENTIALS_KEY=${CHANNEL_CREDENTIALS_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-minimax-m3}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-Repurposer <repurposer@yournpc.ai>}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS:-30}
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION:-ap-southeast-1}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_PRESIGN_UPLOAD_TTL=${S3_PRESIGN_UPLOAD_TTL:-3600}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
      - CHANNEL_CREDENTIALS_KEY=${CHANNEL_CREDENTIALS_KEY}
    depends_on:
      db:
        condition: service_healthy
      render:
        condition: service_started
    restart: unless-stopped

  render:
    build:
      context: .
      dockerfile: apps/render/Dockerfile
    environment:
      - RENDER_PORT=3001
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
