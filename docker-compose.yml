services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repurposer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-minimax-m3}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-Repurposer <repurposer@yournpc.ai>}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS:-30}
      - AUTH_ALLOW_DEFAULT_USER=${AUTH_ALLOW_DEFAULT_USER:-false}
      - ASSET_DIR=/repo/assets
      # Absolute base the render service uses to fetch source clips back over HTTP.
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
    volumes:
      - ./assets:/repo/assets
    depends_on:
      - db

  # Queue worker: same image as api, different entrypoint. This is the process
  # that POSTs clip-specs to the render service and writes the results back.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/repurposer
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-minimax-m3}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-Repurposer <repurposer@yournpc.ai>}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS:-30}
      - AUTH_ALLOW_DEFAULT_USER=${AUTH_ALLOW_DEFAULT_USER:-false}
      - ASSET_DIR=/repo/assets
      - API_PUBLIC_URL=http://api:8000
      - RENDER_URL=http://render:3001/render
    volumes:
      - ./assets:/repo/assets
    depends_on:
      - db
      - render

  # Remotion render service (clip-spec -> MP4+SRT). Headless Chromium + bundled
  # FFmpeg, called by the worker; off the request path for text-only flows.
  # Build context is the repo root (workspace pkg — see apps/render/Dockerfile).
  render:
    build:
      context: .
      dockerfile: apps/render/Dockerfile
    environment:
      - RENDER_PORT=3001
      - RENDER_OUTPUT_DIR=/repo/assets
    volumes:
      # Shared with api/worker: render writes here, api serves it via Range.
      - ./assets:/repo/assets

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
